<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>holy-agents</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#b0b0b0;font-family:'Courier New',monospace;min-height:100vh}
.header{padding:20px;border-bottom:1px solid #1a1a1a;text-align:center}
.header h1{color:#e0e0e0;font-size:18px;letter-spacing:3px;text-transform:uppercase}
.header p{color:#555;font-size:11px;margin-top:4px}
.container{display:flex;height:calc(100vh - 70px)}
.sidebar{width:220px;border-right:1px solid #1a1a1a;padding:16px;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column}
canvas{flex:1;display:block;background:#050505}
.status-bar{border-top:1px solid #1a1a1a;padding:12px 16px;font-size:11px;color:#555;display:flex;justify-content:space-between}
.sidebar h2{color:#888;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.agent-card{border:1px solid #1a1a1a;padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color 0.2s}
.agent-card:hover{border-color:#333}
.agent-card.active{border-color:#555}
.agent-name{color:#e0e0e0;font-size:12px;font-weight:bold}
.agent-emoji{font-size:18px;margin-right:6px}
.agent-role{color:#555;font-size:10px;margin-top:2px}
.agent-zone{color:#444;font-size:9px}
.query-box{border-top:1px solid #1a1a1a;padding:12px 16px}
.query-input{width:100%;background:#111;border:1px solid #1a1a1a;color:#e0e0e0;padding:8px 12px;font-family:'Courier New',monospace;font-size:12px;outline:none}
.query-input:focus{border-color:#333}
.query-input::placeholder{color:#333}
.log{border-top:1px solid #1a1a1a;max-height:200px;overflow-y:auto;padding:8px 16px;font-size:10px}
.log-entry{padding:2px 0;color:#555}
.log-entry .time{color:#333}
.log-entry .agent{font-weight:bold}
.log-entry .scribe{color:#4a9}
.log-entry .judge{color:#a84}
.log-entry .prophet{color:#a44}
.log-entry .sentinel{color:#44a}
.log-entry .ledge{color:#888}
</style>
</head>
<body>
<div class="header">
  <h1>Holy Agents</h1>
  <p>Faith-governed agent runtime · v0.1.0</p>
</div>
<div class="container">
  <div class="sidebar">
    <h2>Agents</h2>
    <div id="agent-list"></div>
    <h2 style="margin-top:16px">RTRUST Rules</h2>
    <div id="rule-list" style="font-size:10px;color:#555"></div>
  </div>
  <div class="main">
    <canvas id="canvas"></canvas>
    <div class="query-box">
      <input class="query-input" id="query" placeholder="🔍📖 search scripture, 🔍📚 dictionary, 🔍🌐 wikipedia" />
    </div>
    <div class="log" id="log"></div>
    <div class="status-bar">
      <span id="chain-status">chain: loading</span>
      <span id="agent-count">agents: 5</span>
      <span id="last-verdict">verdict: —</span>
    </div>
  </div>
</div>
<script src="visualizer.js"></script>
</body>
</html>
